name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag override. Leave blank to use commit SHA.
        required: false
        type: string

      terraform_only:
        description: Run Terraform only (skip Docker & deploy)
        required: false
        default: false
        type: boolean

      deploy_only:
        description: Run ECS deploy only (skip Terraform)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'shu-chatbot-production' }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'shu-chatbot-production-cluster' }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE || 'shu-chatbot-production-service' }}
  ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION || 'shu-chatbot-production' }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'shu-chatbot-production' }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'shu-chatbot-tf-lock' }}

concurrency:
  group: shu-chatbot-production
  cancel-in-progress: false

jobs:

  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.deploy_only != 'true' }}

    defaults:
      run:
        working-directory: infra   # ✅ FIX: critical missing part

    outputs:
      ecr_repository_url: ${{ steps.tf-outputs.outputs.ecr_repository_url }}
      ecs_cluster_name: ${{ steps.tf-outputs.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf-outputs.outputs.ecs_service_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=shu-chatbot/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_region=${AWS_REGION}" \
            -var="google_api_key=${{ secrets.GOOGLE_API_KEY }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Capture outputs
        id: tf-outputs
        run: |
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> $GITHUB_OUTPUT
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service_name=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT

  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.event.inputs.terraform_only != 'true' }}
    needs: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          if [[ -z "${{ secrets.GOOGLE_API_KEY }}" ]]; then
            echo "Missing GOOGLE_API_KEY"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      - name: Set image tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG=${GITHUB_SHA::12}
          fi
          echo "image_tag=$TAG" >> $GITHUB_OUTPUT

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        id: build
        run: |
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ steps.meta.outputs.image_tag }}"
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION}" \
            --query taskDefinition > task-definition.json

      - name: Render task definition
        id: task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image_uri }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Summary
        run: echo "Deployment complete"
